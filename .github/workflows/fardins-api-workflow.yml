name: fardins-api Workflow
on:
  workflow_dispatch:
    inputs:
      apiId:
        description: "API identifier"
        required: true
        default: "fardins-api"
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build-integration-env.yml
    secrets: inherit
    with:
      integration_id: ${{ inputs.apiId }}

  deploy-dev:
    needs: build
    uses: ./.github/workflows/deploy-integration-env.yml
    secrets: inherit
    with:
      integration_id: ${{ inputs.apiId }}
      environment: dev
      bicep_file: ${{ inputs.apiId }}/Deployment/Bicep/Main.bicep
      functions_package: ${{ inputs.apiId }}/Functions
      logicapp_definition: ${{ inputs.apiId }}/LogicAppWorkspace

  summary:
    needs: [build, deploy-dev]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "## API Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**API ID:** ${{ inputs.apiId }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Status:** ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy dev:** ${{ needs.deploy-dev.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
